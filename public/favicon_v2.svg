<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="innerClip">
      <circle cx="32" cy="32" r="17"/>
    </clipPath>
    <clipPath id="outerClip">
      <circle cx="32" cy="32" r="29"/>
    </clipPath>
  </defs>

  <!-- Scalloped blue outer badge — approximated with a larger circle + stroke trick -->
  <circle cx="32" cy="32" r="30" fill="#00AEEF"/>
  <!-- Scallop effect: 12-point star overlaid -->
  <polygon points="
    32,2 34.5,8 40,5 40,11.5 46,11 44,17 50,19 46,24 52,27.5
    48,32 52,36.5 46,40 50,45 44,47 46,53 40,52.5 40,59 34.5,56
    32,62 29.5,56 24,59 24,52.5 18,53 20,47 14,45 18,40
    12,36.5 16,32 12,27.5 18,24 14,19 20,17 18,11 24,11.5 24,5 29.5,8"
    fill="#00AEEF" stroke="#00AEEF" stroke-width="1"/>

  <!-- White ring -->
  <circle cx="32" cy="32" r="27" fill="white"/>

  <!-- Black border ring -->
  <circle cx="32" cy="32" r="23" fill="#111"/>

  <!-- Thin white inner ring -->
  <circle cx="32" cy="32" r="22" fill="white"/>

  <!-- Scene background: sky -->
  <circle cx="32" cy="32" r="17" fill="#7EC8E3"/>

  <!-- Scene clipped content -->
  <g clip-path="url(#innerClip)">
    <!-- Sky -->
    <rect x="15" y="15" width="34" height="34" fill="#7EC8E3"/>

    <!-- Sun glow -->
    <circle cx="32" cy="26" r="7" fill="#FFE033" opacity="0.4"/>
    <!-- Sun body -->
    <circle cx="32" cy="26" r="5" fill="#FFD700"/>
    <!-- Sun rays -->
    <line x1="32" y1="17" x2="32" y2="20" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="39" y1="19" x2="37" y2="22" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="42" y1="26" x2="38" y2="26" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="25" y1="19" x2="27" y2="22" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="22" y1="26" x2="26" y2="26" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="39" y1="33" x2="37" y2="30" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="25" y1="33" x2="27" y2="30" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Left hill (dark green) -->
    <ellipse cx="20" cy="42" rx="13" ry="10" fill="#2E7D32"/>
    <!-- Right hill (dark green) -->
    <ellipse cx="44" cy="42" rx="13" ry="10" fill="#388E3C"/>
    <!-- Valley floor (lighter green) -->
    <ellipse cx="32" cy="46" rx="12" ry="7" fill="#4CAF50"/>

    <!-- Road/path (white dotted) -->
    <ellipse cx="32" cy="50" rx="3.5" ry="5" fill="#E0E0E0"/>
    <ellipse cx="32" cy="47" rx="2.5" ry="3.5" fill="#BDBDBD"/>
  </g>

  <!-- Inner circle border (black ring outline) -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#111" stroke-width="1.5"/>
  <!-- White ring text band outline -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#111" stroke-width="0.75"/>
  <circle cx="32" cy="32" r="27" fill="none" stroke="#111" stroke-width="0.75"/>

  <!-- Gold arc at top (matching original logo) -->
  <path d="M 8 20 Q 32 1 56 20" fill="none" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
</svg>
